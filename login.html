<!DOCTYPE html>
<html>

<head>
    <title>EduTrack Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="login-container">

        <h1>EduTrack</h1>

        <input
            type="text"
            id="username"
            placeholder="Username">

        <input
            type="password"
            id="password"
            placeholder="Password">

        <button id="loginBtn">
            Login
        </button>

        <p id="error"></p>

    </div>

    <script src="login.js"></script>

</body>

</html>
